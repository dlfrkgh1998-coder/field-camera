<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>건설현장 워터마크 카메라</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', Arial, sans-serif; }
        /* 고급스러운 미드나이트 다크 테마 적용 */
        body { background: #0f1115; padding: 15px; color: #f1f3f5; }
        h3 { margin-bottom: 12px; color: #ffffff; font-size: 18px; border-left: 4px solid #4dabf7; padding-left: 8px; }
        .card { background: #1a1d24; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #252a34; }
        label { display: block; margin-top: 14px; font-weight: bold; font-size: 14px; color: #adb5bd; }
        input[type="text"], input[type="file"] { width: 100%; padding: 14px; margin-top: 6px; border: 1px solid #252a34; border-radius: 8px; font-size: 16px; background-color: #212529; color: #fff; -webkit-appearance: none; }
        input[type="text"]::placeholder { color: #495057; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-blue { background: #339af0; color: white; }
        .btn-blue:active { background: #228be6; }
        .btn-green { background: #37b24d; color: white; }
        .btn-green:active { background: #2f9e44; }
        .btn-red { background: #f03e3e; color: white; padding: 6px 12px; font-size: 13px; margin-top: 0; width: auto; display: inline-block; border-radius: 4px; }
        .btn-red:active { background: #e03131; }
        #preview { max-width: 100%; border-radius: 8px; margin-top: 12px; display: none; height: auto; border: 1px solid #343a40; }
        .hint { font-size: 12px; color: #868e96; margin-top: 6px; display: block; }
        .history-box { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; min-height: 25px; }
        .history-tag { background: #212529; padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; color: #dee2e6; display: inline-block; border: 1px solid #343a40; }
        .history-tag:active { background: #343a40; color: #fff; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="mainPage">
        <div class="card">
            <h3>1. 사진 선택 (촬영 또는 앨범)</h3>
            <input type="file" id="imageInput" accept="image/*" onchange="loadImage(event)">
        </div>

        <div class="card">
            <div class="header-area">
                <h3>2. 현장 정보 입력</h3>
                <button class="btn-red" onclick="clearHistory()">기록 초기화</button>
            </div>
            
            <label>현장 이름</label>
            <input type="text" id="inputSite" placeholder="예: 서울아파트 현장">
            <span class="hint">자주 쓰는 항목:</span>
            <div class="history-box" id="historySite"></div>

            <label>동 입력</label>
            <input type="text" id="inputDong" placeholder="예: 101동">
            <div class="history-box" id="historyDong"></div>

            <label>호수 입력</label>
            <input type="text" id="inputHo" placeholder="예: 502호">
            <div class="history-box" id="historyHo"></div>

            <label>작업 내용 (공종)</label>
            <input type="text" id="inputContent" placeholder="예: 방수공사">
            <div class="history-box" id="historyContent"></div>
        </div>

        <button class="btn-blue" onclick="processImage()">✨ 워터마크 합성하기</button>

        <div class="card" id="resultCard" style="display:none; margin-top:15px;">
            <h3>3. 완성된 사진 (미리보기)</h3>
            <img id="preview" alt="완성 이미지">
            <button class="btn-green" onclick="downloadImage()">💾 갤러리에 저장</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        var originalImage = null;
        var historyData = { site: [], dong: [], ho: [], content: [] };

        window.onload = function() {
            try {
                var savedHistory = localStorage.getItem('constructionInputHistory');
                if (savedHistory) {
                    historyData = JSON.parse(savedHistory);
                } else {
                    historyData = {
                        site: ["시청", "서울현장"],
                        dong: ["101동", "102동"],
                        ho: ["502호", "101호"],
                        content: ["방수공사", "타일시공"]
                    };
                }
            } catch (e) {
                historyData = { site: ["시청"], dong: ["101동"], ho: ["502호"], content: ["방수공사"] };
            }
            renderHistoryTags();
        };

        function renderHistoryTags() {
            setupSection('Site', historyData.site);
            setupSection('Dong', historyData.dong);
            setupSection('Ho', historyData.ho);
            setupSection('Content', historyData.content);
        }

        function setupSection(type, list) {
            var box = document.getElementById('history' + type);
            if (!box) return;
            box.innerHTML = '';
            if (!list) return;
            
            for (var i = 0; i < list.length; i++) {
                (function(item) {
                    if (!item) return;
                    var tag = document.createElement('span');
                    tag.className = 'history-tag';
                    tag.innerText = item;
                    tag.onclick = function() {
                        var targetInput = document.getElementById('input' + type);
                        if (targetInput) targetInput.value = item;
                    };
                    box.appendChild(tag);
                })(list[i]);
            }
        }
        function addNewHistory(type, value) {
            if (!value) return;
            if (!historyData[type]) historyData[type] = [];
            var list = historyData[type];
            var index = list.indexOf(value);
            if (index > -1) { list.splice(index, 1); }
            list.unshift(value);
            if (list.length > 5) { list.pop(); }
            try {
                localStorage.setItem('constructionInputHistory', JSON.stringify(historyData));
            } catch (e) {}
        }

        function clearHistory() {
            if (confirm("자주 쓰는 항목 기록을 모두 지우시겠습니까?")) {
                try {
                    localStorage.removeItem('constructionInputHistory');
                } catch (e) {}
                window.location.reload();
            }
        }

        function loadImage(event) {
            try {
                var file = event.target.files;
                if (!file || file.length === 0) return;
                
                var reader = new FileReader();
                reader.onload = function(e) {
                    if (originalImage) { originalImage = null; }
                    originalImage = new Image();
                    originalImage.onload = function() {
                        var resCard = document.getElementById('resultCard');
                        if (resCard) resCard.style.display = 'none';
                    };
                    originalImage.src = e.target.result;
                };
                reader.readAsDataURL(file[0]);
            } catch (e) {
                alert("사진 로드 오류가 발생했습니다.");
            }
        }

        function processImage() {
            try {
                if (!originalImage) { 
                    alert('먼저 1번 칸에서 사진을 선택해 주세요!'); 
                    return; 
                }

                var canvas = document.getElementById('canvas');
                var ctx = canvas.getContext('2d');

                var maxW = 1200;
                var maxH = 1200;
                var w = originalImage.width;
                var h = originalImage.height;

                if (w > maxW || h > maxH) {
                    if (w > h) {
                        h = Math.round((h * maxW) / w);
                        w = maxW;
                    } else {
                        w = Math.round((w * maxH) / h);
                        h = maxH;
                    }
                }

                canvas.width = w;
                canvas.height = h;
                ctx.drawImage(originalImage, 0, 0, w, h);

                var site = document.getElementById('inputSite').value.trim() || "미지정";
                var dong = document.getElementById('inputDong').value.trim() || "";
                var ho = document.getElementById('inputHo').value.trim() || "";
                var content = document.getElementById('inputContent').value.trim() || "";

                if (site !== "미지정") addNewHistory('site', site);
                if (dong) addNewHistory('dong', dong);
                if (ho) addNewHistory('ho', ho);
                if (content) addNewHistory('content', content);
                renderHistoryTags();

                var textLines = [
                    "현장: " + site,
                    "위치: " + (dong + " " + ho).trim(),
                    "공종: " + content
                ];

                var baseSize = Math.max(canvas.width, canvas.height);
                var fontSize = Math.floor(baseSize * 0.032); 
                var padding = fontSize * 0.8;
                var lineHeight = fontSize * 1.4;

                ctx.font = "bold " + fontSize + "px 'Malgun Gothic', Arial, sans-serif";
                
                var maxTextWidth = 0;
                for (var j = 0; j < textLines.length; j++) {
                    var width = ctx.measureText(textLines[j]).width;
                    if (width > maxTextWidth) maxTextWidth = width;
                }

                var boxWidth = maxTextWidth + (padding * 2);
                var boxHeight = (lineHeight * textLines.length) + (padding * 1.5);
                
                var boxX = fontSize;
                var boxY = canvas.height - boxHeight - fontSize;

                ctx.fillStyle = '#000000'; 
                ctx.fillRect(boxX, boxY, boxWidth, boxHeight);

                ctx.fillStyle = '#FFFFFF';
                ctx.textBaseline = 'top';
                
                for (var k = 0; k < textLines.length; k++) {
                    var textX = boxX + padding;
                    var textY = boxY + padding + (k * lineHeight);
                    ctx.fillText(textLines[k], textX, textY);
                }

                var preview = document.getElementById('preview');
                var resCard = document.getElementById('resultCard');
                
                if (preview && resCard) {
                    preview.src = canvas.toDataURL('image/jpeg', 0.85);
                    preview.style.display = 'block';
                    resCard.style.display = 'block';
                    
                    window.scrollTo({
                        top: resCard.offsetTop,
                        behavior: 'smooth'
                    });
                }
            } catch (e) {
                alert("워터마크 처리 중 에러가 발생했습니다.");
            }
        }

        function downloadImage() {
            try {
                var canvas = document.getElementById('canvas');
                var site = document.getElementById('inputSite').value.trim() || "현장";
                var dong = document.getElementById('inputDong').value.trim() || "";
                var ho = document.getElementById('inputHo').value.trim() || "";
                var content = document.getElementById('inputContent').value.trim() || "";
                
                var filename = (site + "_" + dong + "_" + ho + "_" + content).replace(/\s+/g, '_') + '.jpg';

                var link = document.createElement('a');
                link.download = filename;
                link.href = canvas.toDataURL('image/jpeg', 0.85);
                link.click();
            } catch (e) {
                alert("갤러리 저장에 실패했습니다.");
            }
        }
    </script>
</body>
</html>
