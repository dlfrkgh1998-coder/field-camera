<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>건설현장 워터마크 카메라</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', Arial, sans-serif; }
        /* 요청하신 대로 배경을 진하고 어두운 검은색으로 변경 */
        body { background: #111111; padding: 15px; color: #ffffff; }
        h3 { margin-bottom: 10px; color: #ffffff; }
        .card { background: #222222; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #333; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; color: #aaaaaa; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #444; border-radius: 6px; font-size: 16px; background-color: #333; color: #fff; -webkit-appearance: none; }
        input[type="text"]::placeholder { color: #777; }
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-blue { background: #007bff; color: white; }
        .btn-blue:active { background: #0056b3; }
        .btn-green { background: #28a745; color: white; }
        .btn-green:active { background: #1e7e34; }
        .btn-red { background: #dc3545; color: white; padding: 8px 12px; font-size: 13px; margin-top: 5px; width: auto; display: inline-block; }
        .btn-red:active { background: #bd2130; }
        #preview { max-width: 100%; border-radius: 6px; margin-top: 10px; display: none; height: auto; border: 1px solid #555; }
        .hint { font-size: 12px; color: #888; margin-top: 4px; display: block; }
        .history-box { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 5px; min-height: 25px; }
        .history-tag { background: #444; padding: 6px 10px; border-radius: 15px; font-size: 13px; cursor: pointer; color: #ddd; display: inline-block; border: 1px solid #555; }
        .history-tag:active { background: #555; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #errorLog { color: #ff6b6b; font-family: monospace; font-size: 12px; white-space: pre-wrap; margin-top: 10px; background: #2a1b1b; padding: 10px; border-radius: 6px; display: block; border: 1px solid #5a2b2b; }
    </style>
</head>
<body>

    <div id="mainPage">
        <div class="card">
            <h3>1. 사진 선택 (촬영 또는 앨범)</h3>
            <input type="file" id="imageInput" accept="image/*" onchange="loadImage(event)">
        </div>

        <div class="card">
            <div class="header-area">
                <h3>2. 현장 정보 입력</h3>
                <button class="btn-red" onclick="clearHistory()">기록 초기화</button>
            </div>
            
            <label>현장 이름</label>
            <input type="text" id="inputSite" placeholder="예: 서울아파트 현장">
            <span class="hint">자주 쓰는 항목:</span>
            <div class="history-box" id="historySite"></div>

            <label>동 입력</label>
            <input type="text" id="inputDong" placeholder="예: 101동">
            <div class="history-box" id="historyDong"></div>

            <label>호수 입력</label>
            <input type="text" id="inputHo" placeholder="예: 502호">
            <div class="history-box" id="historyHo"></div>

            <label>작업 내용 (공종)</label>
            <input type="text" id="inputContent" placeholder="예: 방수공사">
            <div class="history-box" id="historyContent"></div>
        </div>

        <button class="btn-blue" onclick="processImage()">✨ 워터마크 합성하기</button>

        <div class="card" id="resultCard" style="display:none; margin-top:15px;">
            <h3>3. 완성된 사진 (미리보기)</h3>
            <img id="preview" alt="완성 이미지">
            <button class="btn-green" onclick="downloadImage()">💾 갤러리에 저장</button>
        </div>

        <div class="card" id="errorCard" style="margin-top:15px;">
            <h3>📋 시스템 상태 확인창</h3>
            <div id="errorLog">앱 준비 완료. 사진과 정보 입력 후 합성을 눌러보세요.</div>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        var originalImage = null;
        var historyData = { site: [], dong: [], ho: [], content: [] };

        function logError(msg) {
            var logBox = document.getElementById('errorLog');
            if(logBox) { logBox.innerText = msg; }
        }

        // 로컬스토리지 오류가 발생해도 절대 멈추지 않는 안전 패치 적용
        window.onload = function() {
            try {
                var savedHistory = null;
                try {
                    savedHistory = localStorage.getItem('constructionInputHistory');
                } catch(storageErr) {
                    console.log("로컬스토리지 제한됨");
                }

                if (savedHistory) {
                    historyData = JSON.parse(savedHistory);
                } else {
                    historyData = {
                        site: ["시청", "서울현장"],
                        dong: ["시창", "101동"],
                        ho: ["시찬", "502호"],
                        content: ["시옿ㅇ", "방수공사"]
                    };
                }
            } catch(e) {
                // 에러 무시하고 기본값 강제 적용
                historyData = { site: [], dong: [], ho: [], content: [] };
            }
            renderHistoryTags();
            logError("시스템 로드 성공. 사진을 올리고 버튼을 눌러보세요.");
        };

        function renderHistoryTags() {
            setupSection('Site', historyData.site);
            setupSection('Dong', historyData.dong);
            setupSection('Ho', historyData.ho);
            setupSection('Content', historyData.content);
        }

        function setupSection(type, list) {
            var box = document.getElementById('history' + type);
            if(!box) return;
            box.innerHTML = '';
            if(!list) return;
            
            for(var i = 0; i < list.length; i++) {
                (function(item) {
                    if(!item) return;
                    var tag = document.createElement('span');
                    tag.className = 'history-tag';
                    tag.innerText = item;
                    tag.onclick = function() {
                        var targetInput = document.getElementById('input' + type);
                        if(targetInput) targetInput.value = item;
                    };
                    box.appendChild(tag);
                })(list[i]);
            }
        }

        function addNewHistory(type, value) {
            if (!value) return;
            if (!historyData[type]) historyData[type] = [];
            var list = historyData[type];
            var index = list.indexOf(value);
            if (index > -1) { list.splice(index, 1); }
            list.unshift(value);
            if (list.length > 5) { list.pop(); }
            try {
                localStorage.setItem('constructionInputHistory', JSON.stringify(historyData));
            } catch(e) {}
        }

        function clearHistory() {
            historyData = { site: [], dong: [], ho: [], content: [] };
            try {
                localStorage.setItem('constructionInputHistory', JSON.stringify(historyData));
            } catch(e) {}
            renderHistoryTags();
            logError("자주 쓰는 기록이 완전히 초기화되었습니다.");
        }

        function loadImage(event) {
            try {
                var file = event.target.files[0];
                if (!file) return;
                
                logError("사진을 분석하고 있습니다: " + file.name);
                
                var reader = new FileReader();
                reader.onload = function(e) {
                    originalImage = new Image();
                    originalImage.onload = function() {
                        logError("사진 선택 성공! 이제 [워터마크 합성하기]를 누르세요.");
                        var resCard = document.getElementById('resultCard');
                        if(resCard) resCard.style.display = 'none';
                    };
                    originalImage.onerror = function() {
                        logError("올바르지 않은 이미지 파일 형식입니다.");
                    };
                    originalImage.src = e.target.result;
                };
                reader.readAsDataURL(file);
            } catch(e) {
                logError("사진을 가져오는 중 오류 발생: " + e.message);
            }
        }

        function processImage() {
            try {
                if (!originalImage) { 
                    alert('먼저 사진을 촬영하거나 선택창에서 가져와주세요!'); 
                    logError("실패: 업로드된 사진을 찾을 수 없습니다.");
                    return; 
                }

                logError("고화질 이미지 압축 및 워터마크 그리는 중...");
                var canvas = document.getElementById('canvas');
                var ctx = canvas.getContext('2d');

                var targetWidth = originalImage.width;
                var targetHeight = originalImage.height;
                var MAX_SIZE = 1400; // 모바일 메모리 다운 방지를 위한 안정 규격 최적화
                
                if (targetWidth > MAX_SIZE || targetHeight > MAX_SIZE) {
                    if (targetWidth > targetHeight) {
                        targetHeight = Math.round((targetHeight * MAX_SIZE) / targetWidth);
                        targetWidth = MAX_SIZE;
                    } else {
                        targetWidth = Math.round((targetWidth * MAX_SIZE) / targetHeight);
                        targetHeight = MAX_SIZE;
                    }
                }

                canvas.width = targetWidth;
                canvas.height = targetHeight;
                ctx.drawImage(originalImage, 0, 0, targetWidth, targetHeight);

                var site = document.getElementById('inputSite').value.trim() || "미지정";
                var dong = document.getElementById('inputDong').value.trim() || "";
                var ho = document.getElementById('inputHo').value.trim() || "";
var content = document.getElementById('inputContent').value.trim() || "";if(site !== "미지정") addNewHistory('site', site);if(dong) addNewHistory('dong', dong);if(ho) addNewHistory('ho', ho);if(content) addNewHistory('content', content);renderHistoryTags();var textLines = ["현장: " + site,"위치: " + (dong + " " + ho).trim(),"공종: " + content];var baseSize = Math.max(canvas.width, canvas.height);var fontSize = Math.floor(baseSize * 0.028);var padding = fontSize * 0.8;var lineHeight = fontSize * 1.4;ctx.font = "bold " + fontSize + "px 'Malgun Gothic', Arial, sans-serif";var maxTextWidth = 0;for(var j = 0; j < textLines.length; j++) {var width = ctx.measureText(textLines[j]).width;if(width > maxTextWidth) maxTextWidth = width;}var boxWidth = maxTextWidth + (padding * 2);var boxHeight = (lineHeight * textLines.length) + (padding * 1.5);var marginX = fontSize;var marginY = fontSize;var boxX = marginX;var boxY = canvas.height - boxHeight - marginY;// 불투명 완전 블랙 박스 배경ctx.fillStyle = '#000000';ctx.fillRect(boxX, boxY, boxWidth, boxHeight);// 고대비 화이트 폰트 출력ctx.fillStyle = '#FFFFFF';ctx.textBaseline = 'top';for(var k = 0; k < textLines.length; k++) {var textX = boxX + padding;var textY = boxY + padding + (k * lineHeight);ctx.fillText(textLines[k], textX, textY);}var preview = document.getElementById('preview');var resCard = document.getElementById('resultCard');if(preview && resCard) {preview.src = canvas.toDataURL('image/jpeg', 0.85);preview.style.display = 'block';resCard.style.display = 'block';logError("성공! 화면을 아래로 내려 완성 사진을 확인하세요.");window.scrollTo({top: resCard.offsetTop,behavior: 'smooth'});}} catch(e) {logError("치명적 합성 에러 발생: " + e.message);alert("합성 중 에러가 발생했습니다. 확인창 문구를 확인해주세요.");}}function downloadImage() {try {var canvas = document.getElementById('canvas');var site = document.getElementById('inputSite').value.trim() || "현장";var dong = document.getElementById('inputDong').value.trim() || "";var ho = document.getElementById('inputHo').value.trim() || "";var content = document.getElementById('inputContent').value.trim() || "";var filename = (site + "" + dong + "" + ho + "" + content).replace(/\s+/g, '') + '.jpg';var link = document.createElement('a');link.download = filename;link.href = canvas.toDataURL('image/jpeg', 0.85);link.click();logError("사진을 저장했습니다. 갤러리(다운로드 폴더)를 확인해 보세요.");} catch(e) {logError("저장 장치 연결 실패: " + e.message);}}
