<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>건설현장 워터마크 카메라</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        body { background: #f0f2f5; padding: 15px; color: #333; }
        h2, h3 { margin-bottom: 10px; color: #1a1a1a; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; background-color: #fff; }
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #28a745; color: white; }
        .btn-red { background: #dc3545; color: white; padding: 8px 12px; font-size: 13px; margin-top: 5px; width: auto; display: inline-block; }
        #preview { max-width: 100%; border-radius: 6px; margin-top: 10px; display: none; }
        .hint { font-size: 12px; color: #666; margin-top: 4px; display: block; }
        .history-box { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 5px; }
        .history-tag { background: #e4e6eb; padding: 6px 10px; border-radius: 15px; font-size: 13px; cursor: pointer; color: #4b4f56; }
        .history-tag:active { background: #d8dadf; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- 메인 작업 화면 -->
    <div id="mainPage">
        <div class="card">
            <h3>1. 사진 불러오기</h3>
            <input type="file" id="imageInput" accept="image/*" capture="camera" onchange="loadImage(event)">
        </div>

        <div class="card">
            <div class="header-area">
                <h3>2. 현장 정보 입력</h3>
                <button class="btn-red" onclick="clearHistory()">입력 기록 초기화</button>
            </div>
            
            <!-- 현장명 -->
            <label>현장 이름</label>
            <input type="text" id="inputSite" placeholder="예: 서울아파트 현장" list="siteList">
            <datalist id="siteList"></datalist>
            <span class="hint">자주 쓰는 항목:</span>
            <div class="history-box" id="historySite"></div>

            <!-- 동 -->
            <label>동 입력</label>
            <input type="text" id="inputDong" placeholder="예: 101동" list="dongList">
            <datalist id="dongList"></datalist>
            <div class="history-box" id="historyDong"></div>

            <!-- 호수 -->
            <label>호수 입력</label>
            <input type="text" id="inputHo" placeholder="예: 502호" list="hoList">
            <datalist id="hoList"></datalist>
            <div class="history-box" id="historyHo"></div>

            <!-- 작업 내용 -->
            <label>작업 내용 (공종)</label>
            <input type="text" id="inputContent" placeholder="예: 방수공사" list="contentList">
            <datalist id="contentList"></datalist>
            <div class="history-box" id="historyContent"></div>
        </div>

        <button class="btn-blue" onclick="processImage()">✨ 워터마크 합성하기</button>

        <div class="card" id="resultCard" style="display:none; margin-top:15px;">
            <h3>3. 완성된 사진 (미리보기)</h3>
            <img id="preview">
            <button class="btn-green" onclick="downloadImage()">💾 갤러리에 저장</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        let originalImage = null;
        
        // 입력 기록을 기억할 배열 변수들
        let historyData = {
            site: [],
            dong: [],
            ho: [],
            content: []
        };

        // 앱 시작 시 로컬스토리지에서 기존 입력 기록 불러오기
        function initData() {
            const savedHistory = localStorage.getItem('constructionInputHistory');
            if (savedHistory) {
                historyData = JSON.parse(savedHistory);
            } else {
                // 초기에 보여줄 샘플 예시 기록
                historyData = {
                    site: ["서울아파트 현장", "부산 빌딩 현장"],
                    dong: ["101동", "102동", "A동"],
                    ho: ["101호", "502호", "지하1층"],
                    content: ["방수공사", "타일시공", "철근배근"]
                };
                saveHistoryToStorage();
            }
            renderHistoryTags();
        }

        // 입력 기록 보존
        function saveHistoryToStorage() {
            localStorage.setItem('constructionInputHistory', JSON.stringify(historyData));
        }

        // 화면에 자주 쓰는 단어 버튼(태그)들과 자동완성 리스트 뿌려주기
        function renderHistoryTags() {
            setupSection('Site', historyData.site);
            setupSection('Dong', historyData.dong);
            setupSection('Ho', historyData.ho);
            setupSection('Content', historyData.content);
        }

        function setupSection(type, list) {
            // 1. 글자 입력 시 밑에 뜨는 자동완성(Datalist) 세팅
            const datalist = document.getElementById(type.toLowerCase() + 'List');
            datalist.innerHTML = '';
            list.forEach(item => {
                const option = document.createElement('option');
                option.value = item;
                datalist.appendChild(option);
            });

            // 2. 터치해서 바로 입력하는 동글동글한 태그 버튼 세팅
            const box = document.getElementById('history' + type);
            box.innerHTML = '';
            list.forEach(item => {
                const tag = document.createElement('span');
                tag.className = 'history-tag';
                tag.innerText = item;
                tag.onclick = function() {
                    document.getElementById('input' + type).value = item;
                };
                box.appendChild(tag);
            });
        }

        // 새로운 입력 데이터를 기록에 추가하는 함수 (중복 제거)
        function addNewHistory(type, value) {
            if (!value) return;
            let list = historyData[type];
            // 이미 존재하면 지우고 맨 앞으로 보내서 최신순 정렬
            const index = list.indexOf(value);
            if (index > -1) {
                list.splice(index, 1);
            }
            list.unshift(value); // 맨 앞에 추가
            
            // 너무 많이 쌓이지 않게 최대 8개까지만 유지
            if (list.length > 8) {
                list.pop();
            }
            saveHistoryToStorage();
        }

        // 기록 초기화 기능
        function clearHistory() {
            if (confirm("자주 쓰는 항목 기록을 모두 지우시겠습니까?")) {
                historyData = { site: [], dong: [], ho: [], content: [] };
                saveHistoryToStorage();
                renderHistoryTags();
            }
        }

        // 사진 파일 읽기
        function loadImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                originalImage = new Image();
                originalImage.onload = function() {
                    document.getElementById('resultCard').style.display = 'none';
                };
                originalImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 워터마크 합성 처리
        function processImage() {
            if (!originalImage) { alert('먼저 사진을 촬영하거나 불러와주세요!'); return; }

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            ctx.drawImage(originalImage, 0, 0);

            // 사용자가 직접 입력창에 타이핑한 텍스트 가져오기
            const site = document.getElementById('inputSite').value.trim() || "미지정";
            const dong = document.getElementById('inputDong').value.trim() || "";
            const ho = document.getElementById('inputHo').value.trim() || "";
            const content = document.getElementById('inputContent').value.trim() || "";

            // 현재 입력한 값을 입력 기록 저장소에 저장하여 다음번에 기억하게 만듦
            if(site !== "미지정") addNewHistory('site', site);
            if(dong) addNewHistory('dong', dong);
            if(ho) addNewHistory('ho', ho);
            if(content) addNewHistory('content', content);
            renderHistoryTags(); // 바뀐 기록 화면에 갱신

            // 워터마크 라인 구성
            const textLines = [
                `현장: ${site}`,
                `위치: ${dong} ${ho}`.trim(),
                `공종: ${content}`
            ];

            const baseSize = Math.max(canvas.width, canvas.height);
            const fontSize = Math.floor(baseSize * 0.025); 
            const padding = fontSize * 0.8;
            const lineHeight = fontSize * 1.4;

            ctx.font = `bold ${fontSize}px 'Malgun Gothic', Arial, sans-serif`;
            
            let maxTextWidth = 0;
            textLines.forEach(line => {
                const width = ctx.measureText(line).width;
                if(width > maxTextWidth) maxTextWidth = width;
            });

            const boxWidth = maxTextWidth + (padding * 2);
            const boxHeight = (lineHeight * textLines.length) + (padding * 1.5);
            
            const marginX = fontSize;
            const marginY = fontSize;
            const boxX = marginX;
            const boxY = canvas.height - boxHeight - marginY;

            // 검은 상자 그리기
            ctx.fillStyle = 'rgba(0, 0, 0, 1.0)'; 
            ctx.fillRect(boxX, boxY, boxWidth, boxHeight);

            // 흰색 굵은 글씨 그리기 (OCR 최적화)
            ctx.fillStyle = '#FFFFFF';
            ctx.textBaseline = 'top';
            
            textLines.forEach((line, index) => {
                const textX = boxX + padding;
                const textY = boxY + padding + (index * lineHeight);
ctx.fillText(line, textX, textY);});const preview = document.getElementById('preview');preview.src = canvas.toDataURL('image/jpeg', 0.9);preview.style.display = 'block';document.getElementById('resultCard').style.display = 'block';document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });}// 파일 저장 다운로드function downloadImage() {const canvas = document.getElementById('canvas');const site = document.getElementById('inputSite').value.trim() || "현장";const dong = document.getElementById('inputDong').value.trim() || "";const ho = document.getElementById('inputHo').value.trim() || "";const content = document.getElementById('inputContent').value.trim() || "";const filename = ${site}_${dong}_${ho}_${content}.replace(/\s+/g, '_') + '.jpg';const link = document.createElement('a');link.download = filename;link.href = canvas.toDataURL('image/jpeg', 0.9);link.click();}window.onload = initData;
